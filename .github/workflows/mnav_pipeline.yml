name: Run mNAV Pipeline

on:
  schedule:
    - cron: "0 4 * * *"   # runs daily at 12:00
  workflow_dispatch:       # allows manual trigger

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout your repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # 4. Run your pipeline
      - name: Run pipeline
        run: |
          python pipeline.py

      # 5. Commit updated database (IMPORTANT)
      - name: Commit updated data
        run: |
          git config --global user.name "Hung-MingWang"
          git config --global user.email "b12902019@csie.ntu.edu.tw"
          git add data/mnav.db
          git commit -m "Update mNAV data" || echo "No changes"
          git push